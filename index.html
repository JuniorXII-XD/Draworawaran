<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HandTrack — AI Gesture Studio ✨</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink:       #ff85c2;
      --pink-soft:  #ffd6ed;
      --lavender:   #b48ef5;
      --lav-soft:   #ede0ff;
      --mint:       #5dddb8;
      --mint-soft:  #d0f7ed;
      --yellow:     #ffd95a;
      --peach:      #ffad6b;
      --sky:        #6ec6ff;
      --bg:         #fff9fe;
      --surface:    #ffffff;
      --border:     #f0d9f7;
      --border2:    #e8d0ff;
      --text:       #4a3260;
      --muted:      #a891c4;
      --nav-h-desk: 68px;
      --nav-h-mob:  58px;
      --r:          20px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      overflow: hidden;
    }

    /* ─── Ambient background blobs ─── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 55% 50% at 10% 5%,  rgba(255,133,194,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 50% 45% at 90% 90%,  rgba(180,142,245,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 50% 50%,  rgba(93,221,184,0.08) 0%, transparent 65%);
      pointer-events: none;
    }

    /* Floating decorative stars */
    body::after {
      content: '✦ ✧ ✦ ✧ ✦';
      position: fixed;
      top: 10px; right: 140px;
      font-size: 13px;
      color: var(--pink);
      opacity: 0.4;
      letter-spacing: 6px;
      pointer-events: none;
      z-index: 0;
      animation: twinkle 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50%       { opacity: 0.7; transform: scale(1.1); }
    }

    /* ══════════════════ NAVBAR ══════════════════ */
    #navbar {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h-desk);
      z-index: 100;
      display: flex; align-items: center;
      padding: 0 24px;
      background: rgba(255, 249, 254, 0.88);
      backdrop-filter: blur(20px) saturate(1.4);
      -webkit-backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 2px solid var(--pink-soft);
      box-shadow: 0 2px 20px rgba(255,133,194,0.12);
    }

    /* Logo */
    .nav-logo {
      display: flex; align-items: center; gap: 10px;
      text-decoration: none; flex-shrink: 0;
    }
    .nav-logo-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px; flex-shrink: 0;
      box-shadow: 0 4px 14px rgba(255,133,194,0.4);
      transform: rotate(-4deg);
      transition: transform 0.25s ease;
    }
    .nav-logo:hover .nav-logo-icon { transform: rotate(4deg) scale(1.08); }

    .nav-logo-text {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      letter-spacing: 0.01em;
      background: linear-gradient(90deg, var(--pink) 0%, var(--lavender) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-logo-badge {
      font-size: 9px; font-weight: 800; letter-spacing: 0.08em;
      text-transform: uppercase; color: var(--lavender);
      background: var(--lav-soft);
      border: 1.5px solid #d9c5ff;
      padding: 2px 7px; border-radius: 999px;
    }

    /* Nav center — status pills */
    .nav-status {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; margin-right: auto;
    }
    .status-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 13px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 999px;
      font-size: 11px; font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.03em;
      box-shadow: 0 2px 8px rgba(180,142,245,0.08);
    }
    .status-pill .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #d9c5ff; flex-shrink: 0;
    }
    .status-pill.live .dot {
      background: #3ddba0;
      box-shadow: 0 0 8px #3ddba0;
      animation: pulse 1.5s infinite;
    }
    .status-pill.live { color: var(--text); border-color: #b8f0dd; }

    /* Nav right — controls */
    .nav-controls { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 18px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      font-size: 13px; font-weight: 800;
      cursor: pointer;
      transition: all 0.18s ease;
      -webkit-tap-highlight-color: transparent;
      white-space: nowrap;
      box-shadow: 0 3px 0 var(--border);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 0 var(--border);
    }
    .btn:active {
      transform: translateY(1px);
      box-shadow: 0 1px 0 var(--border);
    }
    .btn.primary {
      background: linear-gradient(135deg, var(--pink), var(--lavender));
      border-color: transparent;
      color: #fff;
      box-shadow: 0 3px 0 rgba(180,142,245,0.5), 0 4px 14px rgba(255,133,194,0.3);
    }
    .btn.primary:hover {
      box-shadow: 0 5px 0 rgba(180,142,245,0.5), 0 8px 20px rgba(255,133,194,0.35);
    }
    .btn.danger {
      border-color: #ffc0d9;
      color: #e05090;
      box-shadow: 0 3px 0 #ffc0d9;
    }
    .btn.danger:hover { background: var(--pink-soft); }
    .btn.off {
      border-color: #ffd0e8;
      color: #e090b8;
      background: #fff5fa;
      box-shadow: 0 3px 0 #ffd0e8;
    }

    /* ══════════════════ MAIN LAYOUT ══════════════════ */
    #app {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      height: 100svh;
      padding-top: var(--nav-h-desk);
      gap: 0;
    }

    /* ─── Canvas area ─── */
    #stage {
      flex: 1 1 0;
      width: 100%;
      display: flex; align-items: center; justify-content: center;
      padding: 16px 20px 8px;
      min-height: 0;
    }

    #canvas-wrap {
      position: relative;
      border-radius: 26px;
      overflow: hidden;
      box-shadow:
        0 0 0 3px var(--pink-soft),
        0 0 0 5px var(--lav-soft),
        0 10px 40px rgba(180,142,245,0.18),
        0 30px 70px rgba(0,0,0,0.09);
      width: min(1280px, 100%);
      max-height: 100%;
      aspect-ratio: 4 / 3;
    }

    #canvas-wrap canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%; display: block;
    }
    #draw-canvas { z-index: 4; pointer-events: none; }
    #cam-canvas  { z-index: 3; pointer-events: none; }
    video { display: none; }

    /* Overlay badges inside canvas */
    #mode-indicator {
      position: absolute; top: 14px; left: 14px; z-index: 10;
      display: flex; gap: 8px; flex-wrap: wrap;
    }
    .badge {
      display: flex; align-items: center; gap: 5px;
      padding: 5px 12px;
      border-radius: 999px;
      backdrop-filter: blur(14px);
      font-size: 11px; font-weight: 800; letter-spacing: 0.02em;
    }
    .badge.pen {
      background: rgba(180,142,245,0.3);
      color: #7b3fbf;
      border: 1.5px solid rgba(180,142,245,0.5);
    }
    .badge.eraser {
      background: rgba(255,133,194,0.3);
      color: #b03070;
      border: 1.5px solid rgba(255,133,194,0.5);
    }

    /* Canvas cute double-border frame */
    #canvas-wrap::before {
      content: '';
      position: absolute; inset: 0; z-index: 5; pointer-events: none;
      border-radius: 26px;
      border: 2px solid transparent;
      background: linear-gradient(135deg,
        rgba(255,133,194,0.4),
        rgba(255,213,90,0.2) 30%,
        transparent 50%,
        rgba(93,221,184,0.15) 70%,
        rgba(180,142,245,0.4)
      ) border-box;
      -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: destination-out;
      mask-composite: exclude;
    }

    /* ─── HUD bar ─── */
    #hud {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 0;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 999px;
      margin: 8px 20px 16px;
      padding: 0 8px;
      overflow: hidden;
      box-shadow: 0 4px 0 var(--pink-soft), 0 6px 18px rgba(180,142,245,0.1);
    }

    .hud-cell {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 22px;
      position: relative;
    }
    .hud-cell + .hud-cell::before {
      content: '';
      position: absolute; left: 0; top: 20%; bottom: 20%;
      width: 1.5px; background: var(--border);
    }

    .hud-label {
      font-size: 9px; font-weight: 900;
      letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--muted);
    }
    .hud-value {
      font-size: 16px; font-weight: 800;
      color: var(--text);
      font-family: 'Nunito', sans-serif;
    }
    .hud-value.gesture {
      font-size: 18px; min-width: 120px; text-align: center;
    }
    .hud-value.fps {
      color: var(--mint);
      font-size: 14px;
      font-variant-numeric: tabular-nums;
    }
    .hud-value.hands {
      color: var(--lavender);
      font-size: 14px;
    }

    /* ══════════════════ STATUS SCREEN ══════════════════ */
    #status-screen {
      position: fixed; inset: 0; z-index: 200;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      background: var(--bg);
    }

    /* Cute bouncy loader */
    .loader-ring {
      width: 60px; height: 60px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
      animation: bounce 1.1s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%       { transform: translateY(-12px) rotate(12deg); }
    }

    .loader-dots {
      display: flex; gap: 7px; margin-top: 4px;
    }
    .loader-dots span {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--pink);
      animation: dotpop 1.1s ease-in-out infinite;
    }
    .loader-dots span:nth-child(2) { background: var(--lavender); animation-delay: 0.18s; }
    .loader-dots span:nth-child(3) { background: var(--mint);      animation-delay: 0.36s; }
    @keyframes dotpop {
      0%, 100% { transform: scale(0.6); opacity: 0.4; }
      50%       { transform: scale(1.2); opacity: 1; }
    }

    .status-msg {
      font-size: 14px; font-weight: 700; color: var(--muted);
      letter-spacing: 0.04em;
    }

    /* ══════════════════ RESPONSIVE ══════════════════ */
    @media (max-width: 768px) {
      :root { --nav-h-desk: var(--nav-h-mob); }
      #navbar { padding: 0 14px; gap: 8px; }
      .nav-logo-badge { display: none; }
      .nav-status { display: none; }
      .nav-controls { margin-left: auto; }
      .btn { padding: 7px 13px; font-size: 12px; gap: 4px; }
      .btn .btn-label { display: none; }
      #stage { padding: 10px 12px 6px; }
      #hud { margin: 6px 12px 12px; }
      .hud-cell { padding: 10px 14px; }
      .hud-value.gesture { font-size: 15px; min-width: 90px; }
      .hud-value { font-size: 13px; }
      .hud-label { font-size: 9px; }
    }

    @media (max-width: 420px) {
      .hud-cell:last-child { display: none; }
      .hud-cell { padding: 9px 10px; }
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    @media (prefers-reduced-motion: reduce) {
      .loader-ring { animation: none; }
      .loader-dots span { animation: none; }
      body::after { animation: none; }
      .dot { animation: none !important; }
    }

    /* ══════════════════ COLOR PALETTE ══════════════════ */
    #color-palette {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 14px;
      background: rgba(255, 249, 254, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 2px solid var(--pink-soft);
      border-radius: 999px;
      box-shadow: 0 4px 0 var(--pink-soft), 0 6px 24px rgba(255,133,194,0.15);
    }

    .palette-label {
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      padding-right: 4px;
      white-space: nowrap;
    }

    .color-swatch {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2.5px solid rgba(255,255,255,0.9);
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
      flex-shrink: 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }
    .color-swatch:hover {
      transform: scale(1.25) translateY(-2px);
    }
    .color-swatch.active {
      transform: scale(1.3) translateY(-2px);
      border-color: #fff;
      box-shadow: 0 3px 0 var(--pink-soft), 0 0 0 2.5px var(--swatch-glow, rgba(255,133,194,0.5)), 0 0 12px var(--swatch-glow, rgba(255,133,194,0.4));
    }

    .palette-divider {
      width: 1.5px;
      height: 18px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 2px;
    }

    /* Size control */
    .size-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
      flex-shrink: 0;
      font-weight: 900;
      font-family: 'Nunito', sans-serif;
      box-shadow: 0 2px 0 var(--border);
    }
    .size-btn:hover {
      background: var(--lav-soft);
      border-color: var(--lavender);
      color: var(--lavender);
      transform: scale(1.1);
    }

    .size-display {
      font-size: 11px;
      font-weight: 900;
      color: var(--text);
      min-width: 22px;
      text-align: center;
      font-family: 'Nunito', sans-serif;
    }

    @media (max-width: 420px) {
      #color-palette { gap: 5px; padding: 6px 10px; }
      .color-swatch { width: 20px; height: 20px; }
      .palette-label { display: none; }
    }
  </style>
</head>
<body>

<!-- ══ NAVBAR ══ -->
<nav id="navbar">
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">🖐</div>
    <span class="nav-logo-text">HandTrack</span>
    <span class="nav-logo-badge">✨ Beta</span>
  </a>

  <div class="nav-status">
    <div class="status-pill" id="nav-model-pill">
      <span class="dot"></span>
      <span>MediaPipe</span>
    </div>
    <div class="status-pill" id="nav-cam-pill">
      <span class="dot"></span>
      <span>กล้อง</span>
    </div>
  </div>

  <div class="nav-controls">
    <button class="btn primary" id="toggle-draw">
      <span>🎨</span>
      <span class="btn-label">วาด: เปิด</span>
    </button>
    <button class="btn danger" id="clear-draw">
      <span>🗑</span>
      <span class="btn-label">ล้าง</span>
    </button>
  </div>
</nav>

<!-- ══ MAIN ══ -->
<div id="app">
  <div id="stage">
    <div id="canvas-wrap">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="draw-canvas"></canvas>
      <canvas id="cam-canvas"></canvas>
      <div id="mode-indicator">
        <div class="badge pen">✏️ มือขวา = ปากกา</div>
        <div class="badge eraser">⬜ มือซ้าย = ยางลบ</div>
      </div>

      <!-- Color Palette -->
      <div id="color-palette">
        <span class="palette-label">🎨 สี</span>
        <div class="color-swatch active" data-color="#ffffff" style="background:#ffffff; --swatch-glow: rgba(200,180,255,0.6);"></div>
        <div class="color-swatch" data-color="#ff85c2" style="background:#ff85c2; --swatch-glow: rgba(255,133,194,0.6);"></div>
        <div class="color-swatch" data-color="#b48ef5" style="background:#b48ef5; --swatch-glow: rgba(180,142,245,0.6);"></div>
        <div class="color-swatch" data-color="#6ec6ff" style="background:#6ec6ff; --swatch-glow: rgba(110,198,255,0.6);"></div>
        <div class="color-swatch" data-color="#5dddb8" style="background:#5dddb8; --swatch-glow: rgba(93,221,184,0.6);"></div>
        <div class="color-swatch" data-color="#ffd95a" style="background:#ffd95a; --swatch-glow: rgba(255,217,90,0.6);"></div>
        <div class="color-swatch" data-color="#ffad6b" style="background:#ffad6b; --swatch-glow: rgba(255,173,107,0.6);"></div>
        <div class="color-swatch" data-color="#ff6b6b" style="background:#ff6b6b; --swatch-glow: rgba(255,107,107,0.6);"></div>
        <div class="palette-divider"></div>
        <span class="palette-label">ขนาด</span>
        <button class="size-btn" id="size-down">−</button>
        <span class="size-display" id="size-display">5</span>
        <button class="size-btn" id="size-up">+</button>
      </div>
    </div>
  </div>

  <div id="hud">
    <div class="hud-cell">
      <div>
        <div class="hud-label">✨ Gesture</div>
        <div class="hud-value gesture" id="gesture">ยกมือขึ้น</div>
      </div>
    </div>
    <div class="hud-cell">
      <div>
        <div class="hud-label">🖐 Hands</div>
        <div class="hud-value hands" id="hand-count">0 มือ</div>
      </div>
    </div>
    <div class="hud-cell">
      <div>
        <div class="hud-label">⚡ FPS</div>
        <div class="hud-value fps" id="fps">—</div>
      </div>
    </div>
  </div>
</div>

<!-- ══ STATUS SCREEN ══ -->
<div id="status-screen">
  <div class="loader-ring">🖐</div>
  <div class="loader-dots">
    <span></span><span></span><span></span>
  </div>
  <div class="status-msg" id="status">กำลังโหลด...</div>
</div>

<script type="module">
  import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/vision_bundle.mjs";

  const CONNECTIONS = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [0,9],[9,10],[10,11],[11,12],
    [0,13],[13,14],[14,15],[15,16],
    [0,17],[17,18],[18,19],[19,20],
    [5,9],[9,13],[13,17]
  ];
  const FINGER_TIPS  = [4, 8, 12, 16, 20];
  const FINGER_BASES = [2, 6, 10, 14, 18];

  const video      = document.getElementById("video");
  const camCanvas  = document.getElementById("cam-canvas");
  const drawCanvas = document.getElementById("draw-canvas");
  const camCtx     = camCanvas.getContext("2d", { alpha: false });
  camCtx.imageSmoothingEnabled = false;
  const drawCtx    = drawCanvas.getContext("2d");
  const gestureEl  = document.getElementById("gesture");
  const handCountEl= document.getElementById("hand-count");
  const fpsEl      = document.getElementById("fps");
  const statusEl   = document.getElementById("status");
  const statusScr  = document.getElementById("status-screen");
  const toggleBtn  = document.getElementById("toggle-draw");
  const clearBtn   = document.getElementById("clear-draw");
  const modeEl     = document.getElementById("mode-indicator");
  const wrap       = document.getElementById("canvas-wrap");
  const camPill    = document.getElementById("nav-cam-pill");

  let landmarker   = null;
  let frameCount   = 0, fps = 0, fpsTimer = 0;
  let drawEnabled  = true;

  const smoothed   = { Left: null, Right: null };
  const lastDrawPt = { Left: null, Right: null };
  const wasPinch   = { Left: false, Right: false };

  const ALPHA        = 0.5;
  const PINCH_PX_THR = 0.075;
  const ERASER_R     = 40;

  let PEN_W     = 5;
  let penColor  = "#ffffff";
  let penGlow   = "#b48ef5";

  const DETECT_INTERVAL = 33;
  let lastDetectTime = 0;
  let lastResult     = null;

  function lerpPt(prev, next, a) {
    if (!prev) return { x: next.x, y: next.y };
    return { x: prev.x + (next.x - prev.x) * a, y: prev.y + (next.y - prev.y) * a };
  }
  function ndist(a, b) { return Math.hypot(a.x - b.x, a.y - b.y); }

  async function init() {
    statusEl.textContent = "กำลังโหลดโมเดล AI...";
    const vision = await FilesetResolver.forVisionTasks(
      "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.12/wasm"
    );
    landmarker = await HandLandmarker.createFromOptions(vision, {
      baseOptions: {
        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
        delegate: "GPU"
      },
      runningMode: "VIDEO",
      numHands: 2,
      minHandDetectionConfidence: 0.5,
      minHandPresenceConfidence: 0.4,
      minTrackingConfidence: 0.4
    });

    document.getElementById("nav-model-pill").classList.add("live");

    statusEl.textContent = "กำลังเปิดกล้อง...";
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 }, frameRate: { ideal: 30, max: 30 } } });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        const W = video.videoWidth, H = video.videoHeight;
        camCanvas.width = drawCanvas.width = W;
        camCanvas.height = drawCanvas.height = H;
        wrap.style.aspectRatio = `${W} / ${H}`;
        camCanvas.style.transform = drawCanvas.style.transform = "scaleX(-1)";

        camPill.classList.add("live");
        camPill.querySelector("span:last-child").textContent = "Live";

        video.play();
        statusScr.style.display = "none";
        requestAnimationFrame(detect);
      };
    } catch (e) {
      statusEl.textContent = "❌ ไม่สามารถเข้าถึงกล้องได้ กรุณาอนุญาตการใช้งานกล้อง";
      console.error(e);
    }
  }

  function gestureLabel(lm) {
    const tips  = FINGER_TIPS.map(i => lm[i]);
    const bases = FINGER_BASES.map(i => lm[i]);
    const thumbOpen = lm[4].x < lm[3].x;
    const ext = [1,2,3,4].map(i => tips[i].y < bases[i].y);
    const n = ext.filter(Boolean).length + (thumbOpen ? 1 : 0);
    if (!thumbOpen && ext.every(e=>!e)) return "✊ Fist";
    if (thumbOpen && ext.every(e=>e))   return "🖐 Open Hand";
    if (!thumbOpen && ext[0] && !ext[1] && !ext[2] && !ext[3]) return "☝️ Point";
    if (!thumbOpen && ext[0] &&  ext[1] && !ext[2] && !ext[3]) return "✌️ Peace";
    if (thumbOpen && !ext[0] && !ext[1] && !ext[2] && !ext[3]) return "👍 Thumbs Up";
    if (thumbOpen && !ext[0] && !ext[1] && !ext[2] &&  ext[3]) return "🤙 Call Me";
    return `🖐 ${n} Finger${n!==1?'s':''}`;
  }

  function drawSkeleton(lm, hand) {
    const W = camCanvas.width, H = camCanvas.height;
    const isL = hand === "Left";
    // Cute pastel colors for skeleton
    const col1 = isL ? "#ff85c2" : "#b48ef5";
    const tipC = isL ? "#ffffff" : "#ede0ff";

    camCtx.beginPath();
    camCtx.strokeStyle = col1 + "cc";
    camCtx.lineWidth = 3;
    camCtx.lineCap = "round";
    CONNECTIONS.forEach(([a,b]) => {
      camCtx.moveTo(lm[a].x*W, lm[a].y*H);
      camCtx.lineTo(lm[b].x*W, lm[b].y*H);
    });
    camCtx.stroke();

    camCtx.fillStyle = col1;
    camCtx.beginPath();
    lm.forEach((pt,i) => {
      if (!FINGER_TIPS.includes(i)) {
        camCtx.moveTo(pt.x*W+4, pt.y*H);
        camCtx.arc(pt.x*W, pt.y*H, 4, 0, Math.PI*2);
      }
    });
    camCtx.fill();

    camCtx.shadowColor = col1;
    camCtx.shadowBlur = 12;
    camCtx.fillStyle = tipC;
    camCtx.beginPath();
    FINGER_TIPS.forEach(i => {
      const x=lm[i].x*W, y=lm[i].y*H;
      camCtx.moveTo(x+7, y);
      camCtx.arc(x, y, 7, 0, Math.PI*2);
    });
    camCtx.fill();
    camCtx.shadowBlur = 0;
  }

  function drawCursor(x, y, isEraser, active) {
    if (isEraser) {
      camCtx.beginPath(); camCtx.arc(x,y,ERASER_R,0,Math.PI*2);
      camCtx.strokeStyle = active ? "#ff85c2" : "rgba(255,133,194,0.45)";
      camCtx.lineWidth = active ? 3 : 1.5;
      camCtx.setLineDash([6,4]); camCtx.stroke(); camCtx.setLineDash([]);
    } else {
      const r = active ? PEN_W : 6;
      camCtx.beginPath(); camCtx.arc(x,y,r,0,Math.PI*2);
      camCtx.fillStyle = active ? penColor : "rgba(255,255,255,0.5)";
      if (active) { camCtx.shadowColor = penGlow; camCtx.shadowBlur = 14; }
      camCtx.fill();
      camCtx.shadowBlur = 0;
      if (!active) {
        camCtx.strokeStyle = "rgba(255,255,255,0.4)"; camCtx.lineWidth = 1.5;
        camCtx.beginPath();
        camCtx.moveTo(x-14,y); camCtx.lineTo(x+14,y);
        camCtx.moveTo(x,y-14); camCtx.lineTo(x,y+14);
        camCtx.stroke();
      }
    }
  }

  const dimOverlay = (() => {
    const oc = new OffscreenCanvas(2, 2);
    const c = oc.getContext("2d");
    c.fillStyle = "rgba(0,0,0,0.18)";
    c.fillRect(0,0,2,2);
    return oc;
  })();

  function render(ts) {
    frameCount++;
    if (ts - fpsTimer > 1000) {
      fps = frameCount; frameCount = 0; fpsTimer = ts;
      fpsEl.textContent = `${fps} FPS`;
    }

    if (ts - lastDetectTime >= DETECT_INTERVAL) {
      lastDetectTime = ts;
      lastResult = landmarker.detectForVideo(video, ts);
    }

    const res = lastResult;
    if (!res) { requestAnimationFrame(render); return; }

    const W = camCanvas.width, H = camCanvas.height;

    camCtx.drawImage(video, 0, 0, W, H);
    camCtx.drawImage(dimOverlay, 0, 0, W, H);

    const hands = res.landmarks || [];
    handCountEl.textContent = `${hands.length} มือ`;

    const present = new Set();
    const labels  = [];

    hands.forEach((lm, i) => {
      const hand = res.handedness?.[i]?.[0]?.categoryName || "Right";
      present.add(hand);
      drawSkeleton(lm, hand);
      labels.push(gestureLabel(lm));

      if (!drawEnabled) return;

      const thumb = lm[4], index = lm[8];
      const pinching = ndist(thumb, index) < PINCH_PX_THR;
      const raw = { x: (thumb.x + index.x) / 2 * W, y: (thumb.y + index.y) / 2 * H };
      smoothed[hand] = lerpPt(smoothed[hand], raw, ALPHA);
      const sx = smoothed[hand].x, sy = smoothed[hand].y;

      drawCursor(sx, sy, hand === "Left", pinching);

      if (pinching) {
        if (hand === "Left") {
          drawCtx.save();
          drawCtx.globalCompositeOperation = "destination-out";
          drawCtx.beginPath(); drawCtx.arc(sx, sy, ERASER_R, 0, Math.PI*2);
          drawCtx.fill();
          drawCtx.restore();
        } else {
          if (wasPinch[hand] && lastDrawPt[hand]) {
            drawCtx.beginPath();
            drawCtx.moveTo(lastDrawPt[hand].x, lastDrawPt[hand].y);
            drawCtx.lineTo(sx, sy);
            drawCtx.strokeStyle = penColor;
            drawCtx.lineWidth = PEN_W;
            drawCtx.lineCap = "round"; drawCtx.lineJoin = "round";
            drawCtx.shadowColor = penGlow; drawCtx.shadowBlur = 10;
            drawCtx.stroke(); drawCtx.shadowBlur = 0;
          }
          lastDrawPt[hand] = { x: sx, y: sy };
        }
        wasPinch[hand] = true;
      } else {
        wasPinch[hand] = false;
        lastDrawPt[hand] = null;
      }
    });

    ["Left","Right"].forEach(h => {
      if (!present.has(h)) { smoothed[h] = null; wasPinch[h] = false; lastDrawPt[h] = null; }
    });

    gestureEl.textContent = labels.length ? labels.join("  ") : "ยกมือขึ้น";
    gestureEl.style.opacity = labels.length ? "1" : "0.35";

    requestAnimationFrame(render);
  }

  function detect(ts) { render(ts); }

  toggleBtn.addEventListener("click", () => {
    drawEnabled = !drawEnabled;
    toggleBtn.querySelector(".btn-label").textContent = drawEnabled ? "วาด: เปิด" : "วาด: ปิด";
    toggleBtn.classList.toggle("off", !drawEnabled);
    toggleBtn.classList.toggle("primary", drawEnabled);
    modeEl.style.display = drawEnabled ? "flex" : "none";
  });

  clearBtn.addEventListener("click", () => {
    drawCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  });

  const swatches = document.querySelectorAll(".color-swatch");
  const sizeDisplay = document.getElementById("size-display");

  // Updated glow map for new pastel palette
  const glowMap = {
    "#ffffff":  "#b48ef5",
    "#ff85c2":  "#ff85c2",
    "#b48ef5":  "#b48ef5",
    "#6ec6ff":  "#6ec6ff",
    "#5dddb8":  "#5dddb8",
    "#ffd95a":  "#ffd95a",
    "#ffad6b":  "#ffad6b",
    "#ff6b6b":  "#ff6b6b",
  };

  swatches.forEach(sw => {
    sw.addEventListener("click", () => {
      swatches.forEach(s => s.classList.remove("active"));
      sw.classList.add("active");
      penColor = sw.dataset.color;
      penGlow  = glowMap[penColor] || penColor;
    });
  });

  document.getElementById("size-up").addEventListener("click", () => {
    PEN_W = Math.min(30, PEN_W + 2);
    sizeDisplay.textContent = PEN_W;
  });

  document.getElementById("size-down").addEventListener("click", () => {
    PEN_W = Math.max(1, PEN_W - 2);
    sizeDisplay.textContent = PEN_W;
  });

  init();
</script>
</body>
</html>
